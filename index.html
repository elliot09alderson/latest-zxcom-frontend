<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta Tags -->
    <title>ZXCOM — Shop Premium T-Shirts, Bags & Lifestyle Essentials</title>
    <meta
      name="description"
      content="ZXCOM is your destination for premium t-shirts, signature bags and lifestyle essentials. Free delivery on orders above ₹499, easy 7-day returns, and secure checkout."
    />
    <meta name="keywords" content="zxcom, t-shirts, bags, ecommerce, online shopping, premium apparel, streetwear, India" />
    <meta name="author" content="ZXCOM" />
    <meta name="theme-color" content="#0b0b18" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://zxcom.in/" />

    <!-- Icons / PWA -->
    <link rel="icon" type="image/png" href="/zxcom.png" />
    <link rel="apple-touch-icon" href="/zxcom.png" />
    <meta name="apple-mobile-web-app-title" content="ZXCOM" />
    <meta name="application-name" content="ZXCOM" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ZXCOM" />
    <meta property="og:url" content="https://zxcom.in/" />
    <meta property="og:title" content="ZXCOM — Shop Premium T-Shirts, Bags & Lifestyle Essentials" />
    <meta property="og:description" content="Premium t-shirts, signature bags and lifestyle essentials. Free delivery on orders above ₹499. Secure checkout. Easy returns." />
    <meta property="og:image" content="https://res.cloudinary.com/dbrpqazmg/image/upload/v1775708923/zxcom/products/zxcom-logo-banner.jpg" />
    <meta property="og:image:alt" content="ZXCOM — Premium Lifestyle Brand" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ZXCOM — Shop Premium T-Shirts, Bags & Lifestyle Essentials" />
    <meta name="twitter:description" content="Premium t-shirts, signature bags and lifestyle essentials. Free delivery above ₹499. Secure checkout." />
    <meta name="twitter:image" content="https://res.cloudinary.com/dbrpqazmg/image/upload/v1775708923/zxcom/products/zxcom-logo-banner.jpg" />

    <!-- Performance: preconnect to the CDN the site actually uses -->
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
